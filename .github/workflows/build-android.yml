name: Build Android APK per Teacher

# ─── Triggers ─────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:           # run manually from GitHub Actions UI

  push:
    branches: [main]
    paths:
      - "artifacts/mobile/**" # only when the mobile app source changes

# ─── Required GitHub Secrets ──────────────────────────────────────────────────
#
#  AWS_ACCESS_KEY_ID          — IAM key with s3:PutObject on the target bucket
#  AWS_SECRET_ACCESS_KEY      — corresponding IAM secret
#  AWS_REGION                 — e.g. us-east-1  (default: us-east-1)
#  AWS_S3_BUCKET              — destination bucket name
#
#  ANDROID_KEYSTORE_B64       — release keystore encoded as base64
#                               generate: base64 -w 0 release.keystore
#  KEYSTORE_PASSWORD          — keystore store-password
#  KEY_ALIAS                  — key alias inside the keystore
#  KEY_PASSWORD               — key password
#
#  If ANDROID_KEYSTORE_B64 is missing the workflow falls back to debug signing.
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1 ── Fetch teacher list → build dynamic matrix
  # ═══════════════════════════════════════════════════════════════════════════
  fetch-teachers:
    name: "Fetch teachers from API"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count:  ${{ steps.matrix.outputs.count }}

    steps:
      - name: Checkout (for scripts/)
        uses: actions/checkout@v4

      - name: Call /courses-api/teachers/List
        run: |
          curl -sf -X POST \
            "https://api.teachers-eg.com/courses-api/teachers/List" \
            -H "Content-Type: application/json" \
            -d '{"skip":0,"take":500}' \
            -o /tmp/teachers.json \
            || { echo "::error::API request failed"; exit 1; }

          echo "API response size: $(wc -c < /tmp/teachers.json) bytes"

      - name: Build matrix from API response
        id: matrix
        run: python3 scripts/build-matrix.py /tmp/teachers.json >> "$GITHUB_OUTPUT"

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2 ── Build one APK per teacher (parallel matrix)
  # ═══════════════════════════════════════════════════════════════════════════
  build-android:
    name: "APK • ${{ matrix.slug }}"
    needs: fetch-teachers
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false                    # keep building other APKs if one fails
      matrix: ${{ fromJson(needs.fetch-teachers.outputs.matrix) }}

    steps:
      # ── Source ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Runtimes ────────────────────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      # ── Caches ──────────────────────────────────────────────────────────────
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('artifacts/mobile/android/**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── JS dependencies ──────────────────────────────────────────────────────
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # ── Personalise app for this teacher ────────────────────────────────────
      - name: Download teacher icon
        env:
          ICON_URL: ${{ matrix.icon_url }}
        run: |
          if [ -n "$ICON_URL" ]; then
            echo "Downloading: $ICON_URL"
            curl -sL --max-time 30 --fail "$ICON_URL" \
              -o artifacts/mobile/assets/images/icon.png \
              && echo "✅ Icon downloaded" \
              || echo "⚠️  Download failed — keeping default icon"
          else
            echo "ℹ️  No icon URL for this teacher — keeping default"
          fi

      - name: Patch constants/config.ts  (TENANT_ID + APP_NAME)
        env:
          TEACHER_ID:   ${{ matrix.teacher_id }}
          TEACHER_NAME: ${{ matrix.teacher_name }}
        run: |
          python3 - << 'PYEOF'
          import re, os

          path = "artifacts/mobile/constants/config.ts"
          src  = open(path).read()

          name = os.environ["TEACHER_NAME"]
          tid  = os.environ["TEACHER_ID"]

          # Replace the string-literal values in-place
          src = re.sub(r'(APP_NAME\s*:\s*)"[^"]*"',  rf'\1"{name}"', src)
          src = re.sub(r'(TENANT_ID\s*:\s*)"[^"]*"', rf'\1"{tid}"',  src)

          open(path, "w").write(src)
          print(f"✅ config.ts  APP_NAME={name!r}  TENANT_ID={tid!r}")
          PYEOF

      - name: Patch app.json  (name / package / slug)
        env:
          TEACHER_NAME: ${{ matrix.teacher_name }}
          TEACHER_SLUG: ${{ matrix.slug }}
          TEACHER_PKG:  ${{ matrix.package }}
        run: |
          python3 - << 'PYEOF'
          import json, os

          path = "artifacts/mobile/app.json"
          app  = json.load(open(path))

          e    = app["expo"]
          name = os.environ["TEACHER_NAME"]
          slug = os.environ["TEACHER_SLUG"]
          pkg  = os.environ["TEACHER_PKG"]

          e["name"]  = name
          e["slug"]  = slug
          e["android"]["package"]                         = pkg
          e["ios"]["bundleIdentifier"]                    = pkg
          e["android"]["adaptiveIcon"]["backgroundColor"] = "#FFFFFF"
          e["splash"]["backgroundColor"]                  = "#FFFFFF"

          json.dump(app, open(path, "w"), indent=2)
          print(f"✅ app.json   name={name!r}  package={pkg!r}")
          PYEOF

      # ── Generate native Android project ─────────────────────────────────────
      - name: Expo prebuild — generate android/ directory
        working-directory: artifacts/mobile
        run: |
          # Accept SDK licenses non-interactively
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --licenses 2>/dev/null || true

          npx expo prebuild --platform android --clean

      # ── Release keystore ────────────────────────────────────────────────────
      - name: Restore release keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d \
              > artifacts/mobile/android/app/release.keystore
            echo "✅ Keystore restored"
          else
            echo "⚠️  ANDROID_KEYSTORE_B64 not set — falling back to debug signing"
          fi

      # ── Build APK ───────────────────────────────────────────────────────────
      - name: Build APK with Gradle
        working-directory: artifacts/mobile/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f app/release.keystore ]; then
            echo "🔑 Signed release build"
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="$(pwd)/app/release.keystore" \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
              --no-daemon --stacktrace
          else
            echo "🔧 Debug build (no keystore)"
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      # ── Locate APK ──────────────────────────────────────────────────────────
      - name: Find APK path
        id: apk
        run: |
          APK=$(find artifacts/mobile/android/app/build/outputs/apk \
                  -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found after build"
            exit 1
          fi
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "✅ APK: $APK  ($SIZE)"

      # ── Keep copy in GitHub Actions artifacts ───────────────────────────────
      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.slug }}-run${{ github.run_number }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      # ── S3 upload ───────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Upload APK to S3
        env:
          BUCKET:       ${{ secrets.AWS_S3_BUCKET }}
          SLUG:         ${{ matrix.slug }}
          TEACHER_ID:   ${{ matrix.teacher_id }}
          TEACHER_NAME: ${{ matrix.teacher_name }}
          APK_PATH:     ${{ steps.apk.outputs.path }}
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SHORT_SHA="${GITHUB_SHA::8}"
          FILENAME="${SLUG}-${TIMESTAMP}-${SHORT_SHA}.apk"
          S3_KEY="android-builds/${SLUG}/${FILENAME}"

          aws s3 cp "$APK_PATH" "s3://${BUCKET}/${S3_KEY}" \
            --metadata "teacher-id=${TEACHER_ID},teacher-name=${TEACHER_NAME},git-sha=${GITHUB_SHA},run=${GITHUB_RUN_NUMBER}"

          echo "✅ s3://${BUCKET}/${S3_KEY}"

          # Pre-signed download URL (7 days) — useful for sharing
          PRESIGNED=$(aws s3 presign "s3://${BUCKET}/${S3_KEY}" \
            --expires-in 604800 2>/dev/null || echo "")
          if [ -n "$PRESIGNED" ]; then
            echo "🔗 Download URL (7 days): $PRESIGNED"
          fi

          # Append to job summary
          echo "| \`$SLUG\` | \`${FILENAME}\` | [Download]($PRESIGNED) |" \
            >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3 ── Final summary
  # ═══════════════════════════════════════════════════════════════════════════
  report:
    name: "Build summary"
    needs: [fetch-teachers, build-android]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Write summary
        env:
          TEACHER_COUNT: ${{ needs.fetch-teachers.outputs.count }}
          BUILD_RESULT:  ${{ needs.build-android.result }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY

          ## Android multi-tenant build results

          | Field | Value |
          |---|---|
          | Teachers | ${TEACHER_COUNT} |
          | Build result | ${BUILD_RESULT} |
          | Triggered by | ${{ github.actor }} |
          | Commit | \`${{ github.sha }}\` |
          | Run | [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          APKs are stored in S3 under:
          \`\`\`
          s3://<AWS_S3_BUCKET>/android-builds/{slug}/{slug}-{timestamp}-{sha}.apk
          \`\`\`
          SUMMARY
