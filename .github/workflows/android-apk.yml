# ──────────────────────────────────────────────────────────────────────────────
# Build Android APK → Upload to S3
# ──────────────────────────────────────────────────────────────────────────────

name: Android APK → S3

on:
  push:
    branches: [main, master]
    paths:
      - "artifacts/mobile/**"
      - ".github/workflows/android-apk.yml"

  workflow_dispatch:
    inputs:
      build_variant:
        description: "Build variant"
        required: false
        default: "debug"
        type: choice
        options: [debug, release]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"

jobs:
  build-and-upload:
    name: "${{ github.event.inputs.build_variant || 'debug' }} APK → S3"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Toolchain ─────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 3. Gradle cache ───────────────────────────────────────────────────
      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('artifacts/mobile/package.json') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 4. Install JS dependencies (FIXED: Added --no-frozen-lockfile) ────
      - name: Install JS dependencies
        run: pnpm install --no-frozen-lockfile

      # ── 5. Expo Prebuild ──────────────────────────────────────────────────
      - name: Expo Prebuild → Android
        working-directory: artifacts/mobile
        run: pnpm exec expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1
          EXPO_ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          EXPO_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          EXPO_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          EXPO_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # ── 6. Resolve build variant ──────────────────────────────────────────
      - name: Resolve build variant & metadata
        id: vars
        run: |
          VARIANT="${{ github.event.inputs.build_variant || 'debug' }}"
          APP_VERSION=$(node -p "require('./artifacts/mobile/app.json').expo.version")
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          FILENAME="teachers-eg-v${APP_VERSION}-${TIMESTAMP}-${VARIANT}.apk"
          S3_KEY="builds/android/v${APP_VERSION}/${TIMESTAMP}/${FILENAME}"

          echo "variant=${VARIANT}"           >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}"   >> "$GITHUB_OUTPUT"
          echo "timestamp=${TIMESTAMP}"       >> "$GITHUB_OUTPUT"
          echo "filename=${FILENAME}"         >> "$GITHUB_OUTPUT"
          echo "s3_key=${S3_KEY}"             >> "$GITHUB_OUTPUT"

          if [ "${VARIANT}" = "release" ]; then
            echo "gradle_task=assembleRelease"  >> "$GITHUB_OUTPUT"
            echo "apk_dir=release"              >> "$GITHUB_OUTPUT"
          else
            echo "gradle_task=assembleDebug"    >> "$GITHUB_OUTPUT"
            echo "apk_dir=debug"               >> "$GITHUB_OUTPUT"
          fi

      # ── 7. Build APK ──────────────────────────────────────────────────────
      - name: Build APK (${{ steps.vars.outputs.variant }})
        working-directory: artifacts/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew ${{ steps.vars.outputs.gradle_task }} \
            --no-daemon \
            --stacktrace
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx4g
            -XX:MaxMetaspaceSize=512m
            -Dorg.gradle.daemon=false

      # ── 8. Locate produced APK ────────────────────────────────────────────
      - name: Locate APK file
        id: apk
        run: |
          APK_DIR="artifacts/mobile/android/app/build/outputs/apk/${{ steps.vars.outputs.apk_dir }}"
          APK_PATH=$(ls "${APK_DIR}"/app-*.apk | head -1)
          echo "path=${APK_PATH}" >> "$GITHUB_OUTPUT"

      # ── 9. Save as GitHub Actions artifact ───────────────────────────────
      - name: Upload APK as Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.filename }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 14

      # ── 10. Upload to S3 ──────────────────────────────────────────────────
      - name: Upload APK to S3
        run: |
          aws s3 cp \
            "${{ steps.apk.outputs.path }}" \
            "s3://${{ secrets.AWS_S3_BUCKET }}/${{ secrets.AWS_S3_BUCKET_KEY || steps.vars.outputs.s3_key }}" \
            --region "${{ secrets.AWS_REGION }}"
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # ── 11. Build summary ─────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## 📦 Android APK Build

          | Field    | Value |
          |----------|-------|
          | Variant  | \`${{ steps.vars.outputs.variant }}\` |
          | Version  | \`${{ steps.vars.outputs.app_version }}\` |
          | File     | \`${{ steps.vars.outputs.filename }}\` |
          | S3 path  | \`s3://${{ secrets.AWS_S3_BUCKET }}/${{ steps.vars.outputs.s3_key }}\` |
          | Commit   | \`${{ github.sha }}\` |
          SUMMARY
