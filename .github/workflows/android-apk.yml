# ──────────────────────────────────────────────────────────────────────────────
# Build Android APK → Upload to S3
# ──────────────────────────────────────────────────────────────────────────────
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID         — IAM access key with s3:PutObject on the bucket
#   AWS_SECRET_ACCESS_KEY     — Matching IAM secret key
#   AWS_S3_BUCKET             — Bucket name (e.g. my-releases)
#   AWS_REGION                — Bucket region (e.g. us-east-1)
#
# Optional Secrets (only needed for a SIGNED release APK):
#   ANDROID_KEYSTORE_BASE64   — base64-encoded .jks / .keystore file
#                               Generate: base64 -w 0 release.keystore
#   ANDROID_KEYSTORE_PASSWORD — Keystore password
#   ANDROID_KEY_ALIAS         — Key alias inside the keystore
#   ANDROID_KEY_PASSWORD      — Key password
#
# S3 output path:
#   builds/android/v{version}/{YYYYMMDD-HHmmss}/teachers-eg-v{ver}-{ts}-{variant}.apk
# ──────────────────────────────────────────────────────────────────────────────

name: Android APK → S3

on:
  push:
    branches: [main, master]
    paths:
      - "artifacts/mobile/**"
      - "lib/**"
      - ".github/workflows/android-apk.yml"

  workflow_dispatch:
    inputs:
      build_variant:
        description: "Build variant"
        required: false
        default: "debug"
        type: choice
        options: [debug, release]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  # React Native 0.76 (Expo 54) requires NDK 27
  NDK_VERSION: "27.1.12297006"

# ─── Job ──────────────────────────────────────────────────────────────────────
jobs:
  build-and-upload:
    name: "${{ github.event.inputs.build_variant || 'debug' }} APK → S3"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Toolchain ─────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      # Install Android SDK + NDK 27 (required by React Native new architecture)
      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.NDK_VERSION }}
        run: sdkmanager "ndk;${{ env.NDK_VERSION }}"

      # ── 3. Gradle + NDK cache ─────────────────────────────────────────────
      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          key: gradle-ndk-${{ runner.os }}-${{ hashFiles('artifacts/mobile/package.json') }}
          restore-keys: gradle-ndk-${{ runner.os }}-

      # ── 4. Install JS dependencies ────────────────────────────────────────
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. Expo Prebuild (generates the native Android project) ───────────
      - name: Expo Prebuild → Android
        working-directory: artifacts/mobile
        run: pnpm exec expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      # ── 6. Resolve build variant & metadata ──────────────────────────────
      - name: Resolve variant & metadata
        id: vars
        run: |
          VARIANT="${{ github.event.inputs.build_variant || 'debug' }}"
          APP_VERSION=$(node -p "require('./artifacts/mobile/app.json').expo.version")
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          FILENAME="teachers-eg-v${APP_VERSION}-${TIMESTAMP}-${VARIANT}.apk"
          S3_KEY="builds/android/v${APP_VERSION}/${TIMESTAMP}/${FILENAME}"

          echo "variant=${VARIANT}"         >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "timestamp=${TIMESTAMP}"     >> "$GITHUB_OUTPUT"
          echo "filename=${FILENAME}"       >> "$GITHUB_OUTPUT"
          echo "s3_key=${S3_KEY}"           >> "$GITHUB_OUTPUT"

          if [ "${VARIANT}" = "release" ]; then
            echo "gradle_task=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "apk_dir=release"             >> "$GITHUB_OUTPUT"
          else
            echo "gradle_task=assembleDebug"   >> "$GITHUB_OUTPUT"
            echo "apk_dir=debug"               >> "$GITHUB_OUTPUT"
          fi

      # ── 7. Release signing (skipped if keystore secret is absent) ─────────
      - name: Decode keystore
        # We check the standard step output and our mapped env variable instead of 'secrets'
        if: steps.vars.outputs.variant == 'release' && env.KEYSTORE_SECRET != ''
        env:
          KEYSTORE_SECRET: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_SECRET" | base64 --decode > artifacts/mobile/android/app/release.keystore

      - name: Inject signing config into gradle.properties
        if: steps.vars.outputs.variant == 'release' && env.KEYSTORE_SECRET != ''
        env:
          KEYSTORE_SECRET: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        working-directory: artifacts/mobile/android
        run: |
          cat >> gradle.properties << 'SIGNING'
          MYAPP_STORE_FILE=release.keystore
          MYAPP_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          SIGNING

      # ── 8. Build APK ──────────────────────────────────────────────────────
      - name: Build APK (${{ steps.vars.outputs.variant }})
        working-directory: artifacts/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew ${{ steps.vars.outputs.gradle_task }} \
            --no-daemon \
            --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx4g
            -XX:MaxMetaspaceSize=512m
            -Dorg.gradle.daemon=false

      # ── 9. Locate produced APK ────────────────────────────────────────────
      - name: Locate APK file
        id: apk
        run: |
          APK_DIR="artifacts/mobile/android/app/build/outputs/apk/${{ steps.vars.outputs.apk_dir }}"
          APK_PATH=$(ls "${APK_DIR}"/app-*.apk | head -1)
          echo "path=${APK_PATH}" >> "$GITHUB_OUTPUT"

      # ── 10. Save as GitHub Actions artifact (downloadable without S3) ─────
      - name: Upload APK as Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.filename }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 14

      # ── 11. Upload to S3 ──────────────────────────────────────────────────
      - name: Upload APK to S3
        run: |
          aws s3 cp \
            "${{ steps.apk.outputs.path }}" \
            "s3://${{ secrets.AWS_S3_BUCKET }}/${{ steps.vars.outputs.s3_key }}" \
            --region "${{ secrets.AWS_REGION }}"
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # ── 12. Build summary ─────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## 📦 Android APK Build

          | Field    | Value |
          |----------|-------|
          | Variant  | \`${{ steps.vars.outputs.variant }}\` |
          | Version  | \`${{ steps.vars.outputs.app_version }}\` |
          | File     | \`${{ steps.vars.outputs.filename }}\` |
          | S3 path  | \`s3://${{ secrets.AWS_S3_BUCKET }}/${{ steps.vars.outputs.s3_key }}\` |
          | Commit   | \`${{ github.sha }}\` |
          SUMMARY
